<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhu Tickets — Em Breve</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple: #6200EE;
            --purple-light: #7c3aed;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #a0a0a0;
            --bg: #0d0d0d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com gradiente pulsante */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(98,0,238,0.25) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulseOrb 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
            animation: pulseOrb 8s ease-in-out infinite reverse;
        }

        @keyframes pulseOrb {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
        }

        /* Partículas flutuantes */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(124,58,237,0.6);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Animações de entrada */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0%, 100% { text-shadow: 0 0 0px rgba(124,58,237,0); }
            50% { text-shadow: 0 0 30px rgba(124,58,237,0.5); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 48px;
            animation: slideDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
        }

        .logo-wrap img {
            height: 56px;
            width: auto;
        }

        /* Badge */
        .badge {
            display: inline-block;
            background: rgba(98,0,238,0.2);
            border: 1px solid rgba(98,0,238,0.5);
            color: #b084ff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 28px;
        }

        /* Título */
        h1 {
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s both;
        }

        h1 span {
            color: var(--purple-light);
            animation: shimmer 4s ease-in-out 1.2s infinite;
            display: inline-block;
        }

        /* Subtítulo */
        p.subtitle {
            font-size: 16px;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 48px;
            max-width: 420px;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s both;
        }

        /* Formulário de aviso */
        .notify-form {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 440px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both;
        }

        .notify-form input {
            flex: 1;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .notify-form input::placeholder { color: rgba(255,255,255,0.35); }
        .notify-form input:focus { border-color: var(--purple-light); }

        .notify-form button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: var(--purple);
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .notify-form button:hover {
            background: var(--purple-light);
            box-shadow: 0 0 20px rgba(124,58,237,0.5);
            transform: translateY(-2px);
        }
        .notify-form button:active { transform: scale(0.97); }

        .notify-success {
            display: none;
            color: #b084ff;
            font-size: 14px;
            margin-top: -30px;
            margin-bottom: 40px;
        }

        /* Redes sociais */
        .social-links {
            display: flex;
            gap: 14px;
            margin-bottom: 40px;
            animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.65s both;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--gray);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .social-btn:hover {
            border-color: var(--purple-light);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(124,58,237,0.25);
        }

        /* Footer */
        footer {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
            animation: fadeIn 1s ease 0.8s both;
        }

        footer strong { color: rgba(255,255,255,0.35); }

        @media (max-width: 480px) {
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="wrapper">

    <!-- Logo -->
    <div class="logo-wrap">
        <img src="logo-on.png" alt="Uhu Tickets">
    </div>

    <!-- Título -->
    <h1>Seu próximo Uhu!<br><span>começa aqui.</span></h1>

    <!-- Subtítulo -->
    <p class="subtitle">
        Estamos finalizando a plataforma. Em breve você poderá comprar, vender e gerenciar ingressos de forma simples e segura.
    </p>

    <!-- Formulário de aviso -->
    <form class="notify-form" id="notifyForm" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="Seu melhor e-mail" required>
        <button type="submit">Avisar-me</button>
    </form>
    <p class="notify-success" id="notifySuccess">✓ Cadastro realizado! Te avisamos quando lançar.</p>

    <!-- Redes sociais -->
    <div class="social-links">
        <a href="https://instagram.com/uhutickets" class="social-btn" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            Instagram
        </a>
        <a href="https://tiktok.com/@uhutickets" class="social-btn" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/></svg>
            TikTok
        </a>
    </div>

    <!-- Footer -->
    <footer>
        <strong>contato@uhutickets.com</strong> &nbsp;·&nbsp; uhutickets.com
    </footer>

</div>

<script>
    // Partículas flutuantes
    const container = document.getElementById('particles');
    const count = 18;
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 2;
        p.style.cssText = `
            left: ${Math.random() * 100}%;
            width: ${size}px;
            height: ${size}px;
            animation-duration: ${Math.random() * 12 + 8}s;
            animation-delay: ${Math.random() * 10}s;
            opacity: ${Math.random() * 0.5 + 0.2};
            background: rgba(${Math.random() > 0.5 ? '124,58,237' : '98,0,238'},0.7);
        `;
        container.appendChild(p);
    }

    function handleSubmit(e) {
        e.preventDefault();
        document.getElementById('notifyForm').style.display = 'none';
        document.getElementById('notifySuccess').style.display = 'block';
    }
</script>

</body>
</html>
